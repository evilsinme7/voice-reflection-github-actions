name: 记录语音感悟

on:
  workflow_dispatch:
    inputs:
      text:
        description: 用于手动测试的感悟文本
        required: true
        type: string
  repository_dispatch:
    types: [voice_reflection]

permissions:
  contents: read

concurrency:
  group: voice-reflection-capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 获取代码
        uses: actions/checkout@v6

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: 写入 Notion
        env:
          INPUT_TEXT: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.text || inputs.text }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DAILY_DATABASE_ID: ${{ secrets.NOTION_DAILY_DATABASE_ID }}
          DEEPSEEK_CAPTURE_MODEL: deepseek-v4-flash
          NOTION_API_VERSION: 2025-09-03
          APP_TIMEZONE: Asia/Shanghai
        run: node scripts/capture.mjs
