name: 生成每周回顾

on:
  workflow_dispatch:
  # 完成 Secrets 配置后取消下面两行的注释，启用每周六北京时间 08:00 自动回顾。
  # schedule:
  #   - cron: "0 0 * * 6"

permissions:
  contents: read

concurrency:
  group: voice-reflection-weekly
  cancel-in-progress: false

jobs:
  weekly-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 获取代码
        uses: actions/checkout@v6

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: 生成并写入周回顾
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DAILY_DATABASE_ID: ${{ secrets.NOTION_DAILY_DATABASE_ID }}
          NOTION_WEEKLY_DATABASE_ID: ${{ secrets.NOTION_WEEKLY_DATABASE_ID }}
          DEEPSEEK_WEEKLY_MODEL: deepseek-v4-pro
          NOTION_API_VERSION: 2025-09-03
          APP_TIMEZONE: Asia/Shanghai
        run: node scripts/weekly-review.mjs
